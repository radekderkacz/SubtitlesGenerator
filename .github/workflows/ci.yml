name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# GitHub Actions are free for public repositories, so this CI runs on
# GitHub-hosted runners and never touches private-repo minutes. It covers
# the application's own tests only — no deployment, security scanning, or
# infrastructure (those live in the maintainer's private pipeline).

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r backend/requirements/test.txt
      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
        run: PYTHONPATH=backend pytest backend/tests/

  frontend:
    name: Frontend build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Run Vitest
        working-directory: frontend
        run: npm run test -- --run
